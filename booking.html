<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking | ASTORUN.LIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin:0; font-family: 'Arial', sans-serif; background:#111; color:#fff; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        h1, h2 { font-family: 'Oswald', sans-serif; color: #c00; text-transform: uppercase; text-align: center; }
        
        /* СТИЛЬ ФОРМИ */
        .booking-card { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; font-size: 14px; }
        input, select, textarea { 
            width: 100%; padding: 12px; background: #222; border: 1px solid #444; 
            color: #fff; border-radius: 5px; box-sizing: border-box; font-size: 16px;
        }
        input:focus { border-color: #c00; outline: none; }

        .btn-submit { 
            width: 100%; padding: 15px; background: #c00; color: #fff; border: none; 
            border-radius: 5px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-submit:hover { background: #ff0000; transform: translateY(-2px); }

        /* БЛОК ПРАЙСІВ ТА ВІДЕО */
        .info-section { margin-top: 50px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .info-box { background: #1a1a1a; padding: 20px; border-radius: 10px; border-left: 4px solid #c00; }
        .video-container { margin-top: 30px; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        
        @media (max-width: 600px) { .info-section { grid-template-columns: 1fr; } }
        .success-msg { display: none; color: #0f0; text-align: center; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="color: #666; text-decoration: none;">← На головну</a>
    <h1>Booking / Замовлення Шоу</h1>

    <div class="booking-card">
        <form id="bookingForm">
            <div class="form-group">
                <label>Країна / Country</label>
                <input type="text" id="country" placeholder="Наприклад: Україна, Польща..." required>
            </div>

            <div class="form-group">
                <label>Дата та Час / Date & Time</label>
                <input type="datetime-local" id="datetime" required>
            </div>

            <div class="form-group">
                <label>Тип заходу / Event Type</label>
                <select id="eventType">
                    <option value="Концерт">Концерт / Concert</option>
                    <option value="Весілля">Весілля / Wedding</option>
                    <option value="Корпоратив">Корпоратив / Corporate</option>
                    <option value="Приватна вечірка">Вечірка / Private Party</option>
                </select>
            </div>

            <div class="form-group">
                <label>Кількість гостей / Guests</label>
                <input type="number" id="guests" placeholder="Наприклад: 100">
            </div>

            <div class="form-group">
                <label>Що саме вас цікавить? / Services</label>
                <input type="text" id="services" placeholder="DJ, Pole Dance, Light Show...">
            </div>

            <div class="form-group">
                <label>Ваш Бюджет / Budget ($)</label>
                <input type="text" id="budget" placeholder="Наприклад: 1000$">
            </div>

            <div class="form-group">
                <label>Контакти (Email/Phone/Telegram)</label>
                <input type="text" id="contacts" placeholder="@username або +380..." required>
            </div>

            <button type="submit" class="btn-submit">Надіслати запит / Send Request</button>
            <div id="successMessage" class="success-msg">Дякуємо! Запит надіслано. Ми зв'яжемося з вами.</div>
        </form>
    </div>

    <div class="info-section">
        <div class="info-box">
            <h3>Прайс-лист</h3>
            <ul style="list-style: none; padding: 0; font-size: 14px; color: #aaa;">
                <li>🎧 DJ Set — від $200</li>
                <li>💃 Pole Dance — від $150</li>
                <li>🔥 Full Show — від $500</li>
            </ul>
        </div>
        <div class="info-box">
            <h3>Стилі роботи</h3>
            <p style="font-size: 14px; color: #aaa;">Tech House, EDM, Deep House. Ми забезпечуємо повний технічний райдер за запитом.</p>
        </div>
    </div>

    <div class="video-container">
        <iframe width="100%" height="315" src="https://www.youtube.com/embed/ВАШ_ID_ВІДЕО" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<script>
    const token = "ВАШ_ТОКЕН_БОТА"; // Вставте сюди токен від @BotFather
    const chatId = "ВАШ_ID_ЧАТУ";   // Вставте сюди ваш ID від @userinfobot

    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Збір даних
        const message = `
🌟 **НОВЕ ЗАМОВЛЕННЯ!**
🌍 Країна: ${document.getElementById('country').value}
📅 Дата: ${document.getElementById('datetime').value}
🎉 Тип: ${document.getElementById('eventType').value}
👥 Гості: ${document.getElementById('guests').value}
🎭 Послуги: ${document.getElementById('services').value}
💰 Бюджет: ${document.getElementById('budget').value}
📞 Контакт: ${document.getElementById('contacts').value}
        `;

        // Відправка в Telegram
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;

        fetch(url).then(response => {
            if (response.ok) {
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('bookingForm').reset();
            } else {
                alert("Помилка відправки. Спробуйте ще раз.");
            }
        });
    });
</script>

</body>
</html>
